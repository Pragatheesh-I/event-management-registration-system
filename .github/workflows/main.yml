name: CD - Build and Push to ACR
 
on:
  push:
    branches: ["dev"]
  workflow_dispatch:
 
jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGINSERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
 
      - name: Build and push the app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGINSERVER}}/app:latest
            ${{ secrets.ACR_LOGINSERVER }}/app:${{ github.sha }}
            ${{ secrets.ACR_LOGINSERVER }}/app:${{ github.run_number }}
       # Optional: test SSH connection using the secret
      - name: Test SSH connection
        run: |
          echo "$SSH_KEY" | ssh -o StrictHostKeyChecking=no -i /dev/stdin ${{ secrets.APP_VM_USER }}@${{ secrets.APP_VM_HOST }} 'echo "SSH connection works!"'
        env:
          SSH_KEY: ${{ secrets.APP_VM_SSH_KEY }}
      - name: Deploy to App VM
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker login ${{ secrets.ACR_LOGINSERVER }} -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}
            docker-compose pull
            docker-compose up -d --remove-orphans
