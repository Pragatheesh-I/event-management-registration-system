name: CD - Build and Push to ACR
 
on:
  push:
    branches: ["dev"]
  workflow_dispatch:
 
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGINSERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
 
      - name: Build and push Client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGINSERVER}}/client:latest
            ${{ secrets.ACR_LOGINSERVER }}/client:${{ github.sha }}
            ${{ secrets.ACR_LOGINSERVER }}/client:${{ github.run_number }}
 
      - name: Build and push Server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGINSERVER }}/server:latest
            ${{ secrets.ACR_LOGINSERVER }}/server:${{ github.sha }}
            ${{ secrets.ACR_LOGINSERVER }}/server:${{ github.run_number }}
