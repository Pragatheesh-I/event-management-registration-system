name: CD - Build and Push to ACR
 
on:
  push:
    branches: ["feature/organiser-analytics"]
  workflow_dispatch:
 
jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGINSERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and push the app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGINSERVER}}/app:latest
            ${{ secrets.ACR_LOGINSERVER }}/app:${{ github.sha }}
            ${{ secrets.ACR_LOGINSERVER }}/app:${{ github.run_number }}
      - name: Deploy to App VM
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            cd /home/testadmin
            if [ -d event-management-registration-system ]; then
              cd event-management-registration-system
              git pull
            else
              git clone https://github.com/Pragatheesh-I/event-management-registration-system.git
              cd event-management-registration-system
            fi
          
            sudo docker login ${{ secrets.ACR_LOGINSERVER }} -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}
            sudo docker-compose pull
            sudo docker-compose up -d --remove-orphans
