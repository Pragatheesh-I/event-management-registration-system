name: Build and Deploy to Azure
 
on:
  push:
    branches:
      - dev
 
jobs:
  build-deploy:
    runs-on: ubuntu-latest
 
    steps:
 
    - name: Checkout Repository
      uses: actions/checkout@v4
 
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
 
    - name: Login to Azure Container Registry
      run: |
        az acr login --name eventsacrregistry --expose-token
 
    - name: Build Docker Image
      run: |
        docker build -t ${{ vars.ACR_NAME }}.azurecr.io/${{ vars.IMAGE_NAME }}:latest .
 
    - name: Push Docker Image
      run: |
        docker push ${{ vars.ACR_NAME }}.azurecr.io/${{ vars.IMAGE_NAME }}:latest
 
    - name: Deploy to VM
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |
     
          docker pull ${{ vars.ACR_NAME }}.azurecr.io/${{ vars.IMAGE_NAME }}:latest
     
          DATABASE_URL=$(az keyvault secret show \
            --vault-name ${{ vars.KEYVAULT_NAME }} \
            --name DATABASE_URL \
            --query value -o tsv)
     
          JWT_SECRET=$(az keyvault secret show \
            --vault-name ${{ vars.KEYVAULT_NAME }} \
            --name JWT_SECRET \
            --query value -o tsv)
     
          export DATABASE_URL
          export JWT_SECRET
     
          docker compose down
          docker compose up -d
     
