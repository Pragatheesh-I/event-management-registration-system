name: CI/CD - Build Push Deploy
 
on:
  push:
    branches: ["dev"]

 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
 
    steps:
 
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGINSERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
 
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker login ${{ secrets.ACR_LOGINSERVER }} \
            -u ${{ secrets.ACR_USERNAME }} \
            -p ${{ secrets.ACR_PASSWORD }}
 
            docker pull ${{ secrets.ACR_LOGINSERVER }}/app:latest
 
            cd /home/${{ secrets.VM_USERNAME }}/app

            DATABASE_URL=$(az keyvault secret show \
            --vault-name events-kv \
            --name DATABASE-URL \
            --query value -o tsv)
             
            JWT_SECRET=$(az keyvault secret show \
            --vault-name events-kv \
            --name JWT-SECRET \
            --query value -o tsv)
 
            docker compose down
            docker compose pull
            docker compose up -d
 
