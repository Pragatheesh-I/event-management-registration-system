#cloud-config

package_update: true

packages:
  - docker.io
  - docker-compose
  - curl
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release

runcmd:

  # Enable docker
  - systemctl start docker
  - systemctl enable docker

  # Add user to docker group
  - usermod -aG docker azureuser

  # Install Azure CLI
  - curl -sL https://aka.ms/InstallAzureCLIDeb | bash

  # Run postgres container
  - sudo volume create postgres_data