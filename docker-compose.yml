version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: myeventapp
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    image:image: <ACR_LOGINSERVER>/app:latest   
    ports:
      - "0.0.0.0:8080:3000"
    depends_on:
      - postgres

volumes:
  postgres_data:
